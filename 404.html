  <script>(()=>{const s=localStorage.getItem("theme");if(s?s==="light":matchMedia("(prefers-color-scheme: light)").matches){document.documentElement.setAttribute("data-theme","light");document.querySelector('meta[name="theme-color"]').setAttribute("content","#f1f5f9");}})();</script>
  <style>
    :root { color-scheme: dark; --bg: #0f172a; --text: #94a3b8; --bright: #e2e8f0; --accent: #3ddc84; }
    html[data-theme="light"] { color-scheme: light; --bg: #f1f5f9; --text: #475569; --bright: #0f172a; --accent: #0a8f4e; }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Roboto", -apple-system, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .hex { color: var(--accent); margin-bottom: 1.5rem; }
    h1 { color: var(--bright); font-size: 3rem; letter-spacing: -0.02em; }
    p { margin-top: 0.75rem; }
    a {
      display: inline-block;
      margin-top: 1.75rem;
      padding: 0.8rem 1.9rem;
      border: 1px solid var(--accent);
      border-radius: 0.5rem;
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    a:hover { background: var(--accent); color: var(--bg); }
  </style>
</head>
<body>
  <main>
    <svg class="hex" viewBox="0 0 100 100" width="72" height="72" aria-hidden="true">

    </svg>
    <h1>404</h1>
    <p>This page went off the grid.</p>
    <a href="/">Back to devrath.me</a>
  </main>
</body>
</html>
