<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><g fill='none' stroke='%233ddc84' stroke-width='6' stroke-linecap='round'><path d='M38,25 31,12'/><path d='M62,25 69,12'/></g><path fill='%233ddc84' d='M22,78 L22,50 A28,28 0 0 1 78,50 L78,78 A7,7 0 0 1 71,85 L29,85 A7,7 0 0 1 22,78 Z'/><text x='50' y='71' font-size='46' font-weight='700' fill='%230f172a' text-anchor='middle' font-family='Arial,Helvetica,sans-serif'>D</text></svg>" />
  <script>(()=>{const s=localStorage.getItem("theme");if(s==="light"){document.documentElement.setAttribute("data-theme","light");document.querySelector('meta[name="theme-color"]').setAttribute("content","#f1f5f9");}})();</script>
  <style>
    :root { color-scheme: dark; --bg: #0f172a; --text: #94a3b8; --bright: #e2e8f0; --accent: #3ddc84; }
    html[data-theme="light"] { color-scheme: light; --bg: #f1f5f9; --text: #475569; --bright: #0f172a; --accent: #0a8f4e; }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Roboto", -apple-system, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .hex { color: var(--accent); margin-bottom: 1.5rem; }
    h1 { color: var(--bright); font-size: 3rem; letter-spacing: -0.02em; }
    p { margin-top: 0.75rem; }
    a {
      display: inline-block;
      margin-top: 1.75rem;
      padding: 0.8rem 1.9rem;
      border: 1px solid var(--accent);
      border-radius: 0.5rem;
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    a:hover { background: var(--accent); color: var(--bg); }
  </style>
</head>
<body>
  <main>
    <svg class="hex" viewBox="0 0 100 100" width="72" height="72" aria-hidden="true">
      <path fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" d="M 22,78 L 22,50 A 28,28 0 0 1 78,50 L 78,78 A 7,7 0 0 1 71,85 L 29,85 A 7,7 0 0 1 22,78 Z M 40,25 L 33,13 M 60,25 L 67,13" />
      <text x="50" y="59" dy="0.36em" text-anchor="middle" font-size="34" font-weight="700" fill="currentColor">?</text>
    </svg>
    <h1>404</h1>
    <p>This page went off the grid.</p>
    <a href="/">Back to devrath.me</a>
  </main>
</body>
</html>
