<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200" role="img" aria-label="Devrath — Android hexagon logo">
  <style>
    .hex { stroke:#3ddc84; stroke-width:5; fill:none; stroke-linecap:round; stroke-linejoin:round;
           stroke-dasharray:300; stroke-dashoffset:300; animation:draw 1.1s ease forwards; }
    .bot { transform-box:fill-box; transform-origin:center; opacity:0; transform:scale(.4);
           animation:pop .5s cubic-bezier(.3,1.6,.5,1) .85s forwards; }
    .ant { stroke:#3ddc84; stroke-width:3.6; stroke-linecap:round; fill:none;
           stroke-dasharray:16; stroke-dashoffset:16; animation:draw2 .4s ease 1.05s forwards; }
    .eye { fill:#0f172a; transform-box:fill-box; transform-origin:center;
           animation:blink 4.2s ease-in-out 1.8s infinite; }
    @keyframes draw   { to { stroke-dashoffset:0; } }
    @keyframes draw2  { to { stroke-dashoffset:0; } }
    @keyframes pop    { 0%{opacity:0;transform:scale(.4)} 60%{opacity:1;transform:scale(1.06)} 100%{opacity:1;transform:scale(1)} }
    @keyframes blink  { 0%,92%,100%{transform:scaleY(1)} 96%{transform:scaleY(.1)} }
    @media (prefers-reduced-motion: reduce){
      .hex{stroke-dashoffset:0;animation:none}.bot{opacity:1;transform:none;animation:none}
      .ant{stroke-dashoffset:0;animation:none}.eye{animation:none}
    }
  </style>
  <path class="hex" d="M 50,5 L 11,27 L 11,72 L 50,95 L 89,73 L 89,28 z"/>
  <g class="bot">
    <line class="ant" x1="41" y1="40" x2="36" y2="30.5"/>
    <line class="ant" x1="59" y1="40" x2="64" y2="30.5"/>
    <path d="M30,57 a20,20 0 0 1 40,0 z" fill="#3ddc84"/>
    <circle class="eye" cx="42" cy="48.5" r="2.6"/>
    <circle class="eye" cx="58" cy="48.5" r="2.6"/>
  </g>
</svg>
